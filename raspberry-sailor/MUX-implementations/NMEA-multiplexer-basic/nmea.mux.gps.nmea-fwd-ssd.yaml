#
# MUX definition.
# With SSD1306 oled or eink screen.
# The "NMEA Cache forwarder" (see type: nmea-cache-publisher) is implemented by REST_SSD1306_server_v2.py or
# also by REST_EINK2-13_server.py
# Requires several Python servers to be running... See the script start.all.sh and its options.
#
name: "Real world scenario."
description:
  - Reads GPS
  - Forward data to "NMEA Cache forwarder" (on SSD1306, port 8080)
  - Log data in a file (data.nmea)
  - Forward to TCP as well
context:
  with.http.server: true
  http.port: 9999
  init.cache: true
  default.declination: 0
  markers: markers.yaml
channels:
  - type: file
    filename: /dev/ttyACM0  # Requires a "stty -F /dev/ttyACM0 raw 4800 cs8 clocal (in /etc/rc.local ?)"
    verbose: false
#    sentence.filters: ~GGA,~GSV,~GSA
#    sentence.filters: ~GLL
#    sentence.filters: RMC,GLL
forwarders:
  - type: nmea-cache-publisher
    between-loops: 1  # in seconds
    rest.protocol: http
    rest.machine-name: localhost   # The machine to send the stop-signal to
    # rest.machine-name: 192.168.1.103   # The machine to send the stop-signal to
    rest.port: 8080
    rest.resource: /ssd1306/nmea-data
    rest.verb: PUT
#    rest.query.string: ""
    rest.onclose.resource: /ssd1306/bye-and-clear-screen
    rest.onclose.verb: PUT
    verbose: false
  - type: file
    # filename: data.nmea
    # flush: true
    verbose: false
    timebase.filename: true
    filename.suffix: _LOG
    log.dir: logged
    split: hour
    sentence.filters: ~GGA,~GSV,~GSA
  - type: tcp
    port: 7001